<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Arena — 魔法竞技场</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
#app { display: flex; gap: 16px; }
#game-panel { display: flex; flex-direction: column; gap: 8px; }
#top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #16213e; border-radius: 8px; font-size: 14px; }
#top-bar .turn-info { color: #f0c27f; font-weight: bold; }
#top-bar .phase-info { color: #a0d0ff; padding: 2px 10px; border-radius: 4px; font-weight: bold; }
.phase-selectUnit { color: #a0d0ff; background: rgba(160,208,255,0.12); }
.phase-move { color: #40b4ff; background: rgba(64,180,255,0.12); }
.phase-selectTarget { color: #f0c27f; background: rgba(240,192,127,0.12); }
.phase-enemyTurn { color: #f44336; background: rgba(244,67,54,0.12); }
.phase-gameOver { color: #e0a0ff; background: rgba(224,160,255,0.12); }
canvas { border-radius: 8px; cursor: pointer; }
#side-panel { width: 220px; display: flex; flex-direction: column; gap: 8px; }
#unit-info { background: #16213e; border-radius: 8px; padding: 12px; min-height: 120px; }
#unit-info h3 { color: #f0c27f; margin-bottom: 8px; }
#unit-info .hp-bar { background: #333; border-radius: 4px; height: 16px; margin: 4px 0; overflow: hidden; }
#unit-info .hp-bar .hp-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
#unit-info .hp-fill.player { background: linear-gradient(90deg, #4caf50, #66bb6a); }
#unit-info .hp-fill.enemy { background: linear-gradient(90deg, #f44336, #ef5350); }
#skills-panel { background: #16213e; border-radius: 8px; padding: 12px; }
#skills-panel h3 { color: #a0d0ff; margin-bottom: 8px; }
.skill-btn { display: block; width: 100%; padding: 8px; margin: 4px 0; background: #0f3460; border: 1px solid #533483; border-radius: 6px; color: #e0e0e0; cursor: pointer; text-align: left; transition: background 0.2s; }
.skill-btn:hover:not(:disabled) { background: #533483; }
.skill-btn:disabled { opacity: 0.4; cursor: default; }
.skill-btn .skill-name { font-weight: bold; }
.skill-btn .skill-info { font-size: 12px; color: #aaa; }
#action-bar { display: flex; gap: 8px; }
#action-bar button { padding: 8px 16px; background: #0f3460; border: 1px solid #533483; border-radius: 6px; color: #e0e0e0; cursor: pointer; flex: 1; }
#action-bar button:hover { background: #533483; }
#log-panel { background: #16213e; border-radius: 8px; padding: 12px; max-height: 160px; overflow-y: auto; font-size: 12px; line-height: 1.6; }
#log-panel h3 { color: #e0a0ff; margin-bottom: 6px; }
.log-entry { padding: 2px 0; }
.log-entry.damage { color: #f44336; }
.log-entry.heal { color: #4caf50; }
.log-entry.move { color: #a0d0ff; }
.log-entry.info { color: #f0c27f; }
#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10; }
#overlay-content { background: #16213e; border-radius: 12px; padding: 32px; text-align: center; max-width: 400px; }
#overlay-content h2 { color: #f0c27f; font-size: 28px; margin-bottom: 16px; }
#overlay-content p { margin-bottom: 16px; }
#overlay-content button { padding: 12px 32px; background: #533483; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 16px; margin: 4px; }
#overlay-content button:hover { background: #7b4fa0; }
#save-info { font-size: 12px; color: #888; padding: 4px 8px; }
#battle-predict { background: #16213e; border-radius: 8px; padding: 12px; min-height: 96px; }
#battle-predict-panel h3 { color: #e0a0ff; margin-bottom: 8px; }
#menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,35,0.94); display: none; justify-content: center; align-items: center; z-index: 20; }
#menu-panel { background: #16213e; border-radius: 12px; padding: 28px 36px; text-align: center; max-width: 420px; }
#menu-panel h1 { color: #f0c27f; font-size: 28px; margin-bottom: 8px; }
#menu-panel p { color: #a0d0ff; margin-bottom: 16px; font-size: 14px; }
#menu-section-title { color: #e0a0ff; text-align: left; margin: 14px 0 8px; font-size: 14px; font-weight: bold; }
.menu-btn { display: block; width: 100%; padding: 10px; margin: 6px 0; background: #0f3460; border: 1px solid #533483; border-radius: 8px; color: #e0e0e0; cursor: pointer; font-size: 14px; text-align: left; }
.menu-btn:hover:not(:disabled) { background: #533483; }
.menu-btn:disabled { opacity: 0.4; cursor: default; }
#menu-difficulty { color: #f0c27f; margin: 4px 0 6px; font-size: 13px; }
.diff-row { display: flex; gap: 8px; margin-bottom: 8px; }
.diff-btn { flex: 1; padding: 8px; background: #0f3460; border: 1px solid #533483; border-radius: 8px; color: #e0e0e0; cursor: pointer; font-size: 13px; }
.diff-btn:hover { background: #533483; }
.diff-btn.active { background: #533483; border-color: #f0c27f; color: #f0c27f; font-weight: bold; }
#overlay-action { padding: 12px 32px; background: #533483; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 16px; margin: 4px; }
#overlay-action:hover { background: #7b4fa0; }
</style>
</head>
<body>
<div id="app">
  <div id="game-panel">
    <div id="top-bar">
      <span class="turn-info">回合 <span id="turn-num">1</span></span>
      <span class="phase-info" id="phase-text">选择单位</span>
      <span id="save-info">战绩: <span id="win-count">0</span>胜 / <span id="lose-count">0</span>负</span>
    </div>
    <canvas id="arena" width="640" height="640"></canvas>
    <div id="action-bar">
      <button id="btn-move" onclick="Game.startMove()">移动 (M)</button>
      <button id="btn-end-turn" onclick="Game.endTurn()">结束回合 (Space)</button>
      <button id="btn-skip" onclick="Game.skipUnit()">跳过此单位 (S)</button>
    </div>
  </div>
  <div id="side-panel">
    <div id="unit-info"><h3>单位信息</h3><p id="unit-detail">点击战场上的单位查看详情</p><div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:0%"></div></div><span id="hp-text"></span></div>
    <div id="skills-panel"><h3>技能</h3><div id="skills-list"><p>选择单位后显示可用技能</p></div></div>
    <div id="log-panel"><h3>战斗日志</h3><div id="log-content"></div></div>
    <div id="battle-predict-panel"><h3>战力预测</h3><div id="battle-predict"></div></div>
  </div>
</div>
<div id="menu">
  <div id="menu-panel">
    <h1>Magic Arena · 魔法竞技场</h1>
    <p id="menu-stats"></p>
    <div id="menu-section-title">难度选择（影响敌方强度）</div>
    <div id="menu-difficulty">当前难度: 普通</div>
    <div class="diff-row">
      <button class="diff-btn" id="diff-easy" onclick="Game.setDifficulty('easy')">简单</button>
      <button class="diff-btn active" id="diff-normal" onclick="Game.setDifficulty('normal')">普通</button>
      <button class="diff-btn" id="diff-hard" onclick="Game.setDifficulty('hard')">困难</button>
    </div>
    <div id="menu-section-title">战役模式（选择关卡）</div>
    <div id="menu-levels"></div>
    <div id="menu-section-title">快速对战</div>
    <button class="menu-btn" onclick="Game.startSkirmish()">单局遭遇（随机地图 / 随机敌人）</button>
  </div>
</div>
<div id="overlay">
  <div id="overlay-content">
    <h2 id="overlay-title"></h2>
    <p id="overlay-msg"></p>
    <button id="overlay-action" style="display:none"></button>
    <button onclick="Game.restart()">重新开始</button>
    <button onclick="Game.closeOverlay()">查看战场</button>
  </div>
</div>
<script src="game.js"></script>
<script>
// 键盘快捷键
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'BUTTON') return; // 不拦截按钮焦点中的按键
  switch (e.key.toLowerCase()) {
    case 'm': Game.startMove(); break;
    case '1': Game.castSkill(0); break;
    case '2': Game.castSkill(1); break;
    case '3': Game.castSkill(2); break;
    case 's': Game.skipUnit(); break;
    case ' ': case 'enter': e.preventDefault(); Game.endTurn(); break;
    case 'escape': Game.cancelAction(); break;
  }
});
</script>
</body>
</html>
